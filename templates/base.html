<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}People Help{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
          }
        }
      }
    }
  </script>
  <style>
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    @keyframes slideIn { from { transform: translateY(-1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .toast { animation: slideIn 0.3s ease-out; }
    @keyframes pulse-dot { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
    .typing-dot { animation: pulse-dot 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

  <!-- Navigation -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-5xl mx-auto px-4 sm:px-6">
      <div class="flex items-center h-14 gap-1">
        <span class="text-lg font-semibold text-gray-900 mr-6">People Help</span>
        <a href="/people-help" class="px-3 py-2 rounded-md text-sm font-medium {% block nav_chat %}text-gray-500 hover:text-gray-900 hover:bg-gray-100{% endblock %} transition-colors">Chat</a>
        <a href="/knowledge" class="px-3 py-2 rounded-md text-sm font-medium {% block nav_knowledge %}text-gray-500 hover:text-gray-900 hover:bg-gray-100{% endblock %} transition-colors">Knowledge</a>
        <a href="/workflows" class="px-3 py-2 rounded-md text-sm font-medium {% block nav_workflows %}text-gray-500 hover:text-gray-900 hover:bg-gray-100{% endblock %} transition-colors">Workflows</a>
        <a href="/workflows/approvals" class="px-3 py-2 rounded-md text-sm font-medium {% block nav_approvals %}text-gray-500 hover:text-gray-900 hover:bg-gray-100{% endblock %} transition-colors">Approvals</a>
        <a href="/integrations/hiring" class="px-3 py-2 rounded-md text-sm font-medium {% block nav_hiring %}text-gray-500 hover:text-gray-900 hover:bg-gray-100{% endblock %} transition-colors">Hiring</a>
        <a href="/integrations" class="px-3 py-2 rounded-md text-sm font-medium {% block nav_integrations %}text-gray-500 hover:text-gray-900 hover:bg-gray-100{% endblock %} transition-colors">Integrations</a>
        <a href="/events" class="px-3 py-2 rounded-md text-sm font-medium {% block nav_events %}text-gray-500 hover:text-gray-900 hover:bg-gray-100{% endblock %} transition-colors">Events</a>
        <a href="/analytics" class="px-3 py-2 rounded-md text-sm font-medium {% block nav_analytics %}text-gray-500 hover:text-gray-900 hover:bg-gray-100{% endblock %} transition-colors">Analytics</a>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="max-w-5xl mx-auto px-4 sm:px-6 py-6">
    {% block content %}{% endblock %}
  </main>

  <script>
  function showToast(message, type) {
    type = type || 'success';
    var container = document.getElementById('toast-container');
    var toast = document.createElement('div');
    var bg = type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
    toast.className = 'toast ' + bg + ' text-white px-4 py-2.5 rounded-lg shadow-lg text-sm max-w-xs';
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 4000);
  }
  </script>
</body>
</html>
